name: Deploy to GCS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'prod'
        type: choice
        options:
          - dev
          - prod

jobs:
  setup:
    name: Setup Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
    steps:
      - name: Determine environment
        id: set-env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            ENV="prod"
          else
            ENV="dev"
          fi

          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "### Deployment Target" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: **$ENV**" >> $GITHUB_STEP_SUMMARY

  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: MentalHelpGlobal/chat-types
          path: chat-types
          token: ${{ secrets.PKG_TOKEN }}
      - uses: actions/checkout@v4
        with:
          repository: MentalHelpGlobal/chat-frontend-common
          path: chat-frontend-common
          token: ${{ secrets.PKG_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://npm.pkg.github.com'

      - name: Build chat-types locally
        run: cd chat-types && npm install && npm run build

      - name: Build chat-frontend-common locally
        run: cd chat-frontend-common && npm install && npm run build
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PKG_TOKEN }}

      - name: Install dependencies
        run: |
          npm pkg set "dependencies.@mentalhelpglobal/chat-types=file:./chat-types"
          npm pkg set "dependencies.@mentalhelpglobal/chat-frontend-common=file:./chat-frontend-common"
          npm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PKG_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.PKG_TOKEN }}

      - name: Lint
        run: npx eslint --ignore-pattern 'chat-types/**' --ignore-pattern 'chat-frontend-common/**' .

      - name: Run tests
        run: npx vitest run --coverage --passWithNoTests

  deploy:
    name: Deploy Workbench Frontend
    needs: [setup, test]
    runs-on: ubuntu-latest
    environment: ${{ needs.setup.outputs.environment }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: MentalHelpGlobal/chat-types
          path: chat-types
          token: ${{ secrets.PKG_TOKEN }}
      - uses: actions/checkout@v4
        with:
          repository: MentalHelpGlobal/chat-frontend-common
          path: chat-frontend-common
          token: ${{ secrets.PKG_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://npm.pkg.github.com'

      - name: Build chat-types locally
        run: cd chat-types && npm install && npm run build

      - name: Build chat-frontend-common locally
        run: cd chat-frontend-common && npm install && npm run build
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PKG_TOKEN }}

      - name: Install dependencies
        run: |
          npm pkg set "dependencies.@mentalhelpglobal/chat-types=file:./chat-types"
          npm pkg set "dependencies.@mentalhelpglobal/chat-frontend-common=file:./chat-frontend-common"
          npm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PKG_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.PKG_TOKEN }}

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.BACKEND_URL }}
          VITE_CHAT_URL: ${{ vars.CHAT_URL }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to GCS
        run: gsutil -m rsync -r -d dist/ gs://${{ vars.GCS_BUCKET }}/

      - name: Set cache headers
        run: |
          gsutil -m setmeta -h "Cache-Control:public, max-age=31536000, immutable" \
            "gs://${{ vars.GCS_BUCKET }}/assets/**"
          gsutil setmeta -h "Cache-Control:no-cache, no-store, must-revalidate" \
            "gs://${{ vars.GCS_BUCKET }}/index.html"

      - name: Restore SPA deep-link fallbacks
        run: |
          ROUTES=(
            "login"
            "pending"
            "workbench"
          )
          for route in "${ROUTES[@]}"; do
            gsutil cp "gs://${{ vars.GCS_BUCKET }}/index.html" "gs://${{ vars.GCS_BUCKET }}/${route}"
          done

      - name: Output frontend URL
        run: |
          echo "### Workbench frontend deployed! :white_check_mark:" >> $GITHUB_STEP_SUMMARY
          echo "Bucket: \`${{ vars.GCS_BUCKET }}\`" >> $GITHUB_STEP_SUMMARY
