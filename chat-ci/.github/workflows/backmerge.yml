name: Backmerge
on:
  workflow_call:
    inputs:
      base_branch:
        description: Target branch for backmerge
        type: string
        default: 'develop'
      head_branch:
        description: Source branch for backmerge
        type: string
        default: 'main'

jobs:
  backmerge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check base branch exists
        env:
          GH_TOKEN: ${{ github.token }}
          BASE: ${{ inputs.base_branch }}
        run: |
          if ! gh api "repos/$GITHUB_REPOSITORY/branches/$BASE" --silent 2>/dev/null; then
            echo "::warning::Branch '$BASE' does not exist — skipping backmerge"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
        id: branch-check

      - name: Ensure labels exist
        if: steps.branch-check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create backmerge --repo "$GITHUB_REPOSITORY" \
            --description "Automated backmerge PR" --color "0E8A16" 2>/dev/null || true
          gh label create conflicts --repo "$GITHUB_REPOSITORY" \
            --description "PR has merge conflicts" --color "D93F0B" 2>/dev/null || true

      - name: Check divergence
        if: steps.branch-check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          BASE: ${{ inputs.base_branch }}
          HEAD: ${{ inputs.head_branch }}
        run: |
          AHEAD=$(gh api "repos/$GITHUB_REPOSITORY/compare/$BASE...$HEAD" --jq '.ahead_by')
          echo "ahead_by=$AHEAD"
          if [ "$AHEAD" = "0" ]; then
            echo "::notice::$HEAD and $BASE are in sync — nothing to backmerge"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
        id: divergence

      - name: Check for existing backmerge PR
        if: steps.branch-check.outputs.skip != 'true' && steps.divergence.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          BASE: ${{ inputs.base_branch }}
          HEAD: ${{ inputs.head_branch }}
        run: |
          EXISTING=$(gh api "repos/$GITHUB_REPOSITORY/pulls?state=open&base=$BASE&head=$(echo $GITHUB_REPOSITORY | cut -d/ -f1):$HEAD" \
            --jq '[.[] | select(.labels[].name == "backmerge")] | .[0].number // empty')

          if [ -n "$EXISTING" ]; then
            echo "::notice::Backmerge PR #$EXISTING already exists — updating body"

            COMMITS=$(gh api "repos/$GITHUB_REPOSITORY/compare/$BASE...$HEAD" \
              --jq '[.commits[] | "- " + (.sha[:7]) + " " + (.commit.message | split("\n")[0])] | join("\n")')
            BODY="Automated backmerge of \`$HEAD\` → \`$BASE\`.\n\n### Commits\n\n${COMMITS}"

            gh api "repos/$GITHUB_REPOSITORY/pulls/$EXISTING" -X PATCH \
              -f body="$(echo -e "$BODY")" > /dev/null
            echo "existing_pr=$EXISTING" >> "$GITHUB_OUTPUT"
          fi
        id: existing-pr

      - name: Create backmerge PR
        if: >-
          steps.branch-check.outputs.skip != 'true' &&
          steps.divergence.outputs.skip != 'true' &&
          steps.existing-pr.outputs.existing_pr == ''
        env:
          GH_TOKEN: ${{ github.token }}
          BASE: ${{ inputs.base_branch }}
          HEAD: ${{ inputs.head_branch }}
          SHA: ${{ github.sha }}
        run: |
          COMMITS=$(gh api "repos/$GITHUB_REPOSITORY/compare/$BASE...$HEAD" \
            --jq '[.commits[] | "- " + (.sha[:7]) + " " + (.commit.message | split("\n")[0])] | join("\n")')
          BODY="Automated backmerge of \`$HEAD\` → \`$BASE\` triggered by ${SHA:0:7}.\n\n### Commits\n\n${COMMITS}"

          PR_NUMBER=$(gh api "repos/$GITHUB_REPOSITORY/pulls" \
            -X POST \
            -f head="$HEAD" \
            -f base="$BASE" \
            -f title="chore: backmerge $HEAD → $BASE (triggered by ${SHA:0:7})" \
            -f body="$(echo -e "$BODY")" \
            --jq '.number')

          gh api "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/labels" \
            -X POST --input - <<< '["backmerge"]' > /dev/null 2>&1 || true

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Created backmerge PR #$PR_NUMBER"
        id: create-pr

      - name: Resolve PR number
        if: >-
          steps.branch-check.outputs.skip != 'true' &&
          steps.divergence.outputs.skip != 'true'
        run: |
          PR="${{ steps.create-pr.outputs.pr_number }}${{ steps.existing-pr.outputs.existing_pr }}"
          echo "pr_number=$PR" >> "$GITHUB_OUTPUT"
        id: pr

      - name: Wait for mergeable status
        if: steps.pr.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
        run: |
          for i in 1 2 3 4 5; do
            sleep 5
            MERGEABLE=$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER" --jq '.mergeable // empty')
            echo "Attempt $i: mergeable=$MERGEABLE"
            if [ "$MERGEABLE" = "true" ]; then
              echo "mergeable=MERGEABLE" >> "$GITHUB_OUTPUT"
              exit 0
            elif [ "$MERGEABLE" = "false" ]; then
              echo "mergeable=CONFLICTING" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "mergeable=UNKNOWN" >> "$GITHUB_OUTPUT"
        id: mergeable

      - name: Auto-merge if clean
        if: steps.mergeable.outputs.mergeable == 'MERGEABLE'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
        run: |
          if gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/merge" \
            -X PUT -f merge_method=merge 2>/dev/null; then
            echo "::notice::Backmerge PR #$PR_NUMBER merged successfully"
            gh api "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" \
              -X POST -f body="Backmerge merged automatically — no conflicts detected." > /dev/null 2>&1 || true
          else
            echo "::warning::Auto-merge failed for PR #$PR_NUMBER — leaving open for manual resolution"
          fi

      - name: Label conflicts
        if: steps.mergeable.outputs.mergeable == 'CONFLICTING'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          BASE: ${{ inputs.base_branch }}
          HEAD: ${{ inputs.head_branch }}
        run: |
          gh api "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/labels" \
            -X POST --input - <<< '["conflicts"]' > /dev/null 2>&1 || true
          gh api "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" \
            -X POST \
            -f body="⚠️ This backmerge has merge conflicts and requires manual resolution.

          Please checkout this PR locally, resolve conflicts, and push:
          \`\`\`bash
          git fetch origin
          git checkout $BASE
          git merge origin/$HEAD
          # resolve conflicts
          git push origin $BASE
          \`\`\`"
          echo "::warning::Backmerge PR #$PR_NUMBER has conflicts — labeled for manual resolution"
