name: E2E Tests
on:
  workflow_call:
    inputs:
      base-url:
        description: Frontend URL to test against
        type: string
        required: true
      test-email:
        description: Email for OTP authentication
        type: string
        default: 'playwright@mentalhelp.global'
      timeout:
        description: Test timeout in milliseconds
        type: number
        default: 90000
      retries:
        description: Number of test retries
        type: number
        default: 1
    secrets:
      GITHUB_TOKEN:
        required: true
    outputs:
      passed:
        value: ${{ jobs.e2e.outputs.passed }}
      report-url:
        value: ${{ jobs.e2e.outputs.report-url }}

jobs:
  e2e:
    runs-on: ubuntu-latest
    outputs:
      passed: ${{ steps.test.outputs.passed }}
      report-url: ${{ steps.report.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit
      - name: Run E2E tests
        id: test
        run: |
          npx playwright test --retries=${{ inputs.retries }} && echo "passed=true" >> "$GITHUB_OUTPUT" || echo "passed=false" >> "$GITHUB_OUTPUT"
        env:
          PLAYWRIGHT_BASE_URL: ${{ inputs.base-url }}
          PLAYWRIGHT_EMAIL: ${{ inputs.test-email }}
          PLAYWRIGHT_TIMEOUT: ${{ inputs.timeout }}
      - name: Upload HTML report
        if: always()
        id: report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 14
