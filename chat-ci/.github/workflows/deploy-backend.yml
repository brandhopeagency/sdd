name: Deploy Backend
on:
  workflow_call:
    inputs:
      environment:
        description: Target environment (dev/staging/prod)
        type: string
        required: true
      service-name:
        description: Cloud Run service name
        type: string
        required: true
      region:
        description: GCP region
        type: string
        default: 'europe-west1'
      gcp-project-id:
        description: GCP project ID
        type: string
        required: true
      gcp-service-account:
        description: GCP service account for WIF auth
        type: string
        required: true
      cloud-sql-connection:
        description: 'Cloud SQL instance connection name (empty to skip)'
        type: string
        default: ''
      vpc-connector:
        description: 'VPC connector name for private network access (empty to skip)'
        type: string
        default: ''
      env-vars:
        description: >-
          Comma-separated KEY=VALUE pairs for Cloud Run env vars.
          Secrets are handled separately via secrets input.
        type: string
        default: ''
      min-instances:
        type: number
        default: 0
      max-instances:
        type: number
        default: 10
      memory:
        type: string
        default: '512Mi'
      cpu:
        type: string
        default: '1'
    secrets:
      GCP_WIF_PROVIDER:
        required: true
      DATABASE_URL:
        required: true
      JWT_SECRET:
        required: true
      JWT_REFRESH_SECRET:
        required: true
      GMAIL_CLIENT_SECRET:
        required: false
      GMAIL_REFRESH_TOKEN:
        required: false
      GOOGLE_OAUTH_CLIENT_ID:
        required: false
    outputs:
      service-url:
        description: Deployed Cloud Run service URL
        value: ${{ jobs.deploy.outputs.service-url }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write
    outputs:
      service-url: ${{ steps.output-url.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ inputs.gcp-service-account }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ inputs.region }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          IMAGE="${{ inputs.region }}-docker.pkg.dev/${{ inputs.gcp-project-id }}/chat-backend/${{ inputs.service-name }}:${{ github.sha }}"
          docker build \
            --build-arg GITHUB_TOKEN=${{ github.token }} \
            -t "$IMAGE" .
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Push Docker image
        run: docker push "$IMAGE"

      - name: Deploy to Cloud Run
        run: |
          # Cloud SQL connection flag (if configured)
          CLOUD_SQL_FLAG=""
          if [ -n "${{ inputs.cloud-sql-connection }}" ]; then
            CLOUD_SQL_FLAG="--add-cloudsql-instances=${{ inputs.cloud-sql-connection }}"
          fi

          VPC_FLAG=""
          if [ -n "${{ inputs.vpc-connector }}" ]; then
            VPC_FLAG="--vpc-connector=${{ inputs.vpc-connector }} --vpc-egress=private-ranges-only"
          fi

          # Build secret env vars
          SECRET_VARS="DATABASE_URL=${{ secrets.DATABASE_URL }}"
          SECRET_VARS="${SECRET_VARS},JWT_SECRET=${{ secrets.JWT_SECRET }}"
          SECRET_VARS="${SECRET_VARS},JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}"

          if [ -n "${{ secrets.GMAIL_CLIENT_SECRET }}" ]; then
            SECRET_VARS="${SECRET_VARS},GMAIL_CLIENT_SECRET=${{ secrets.GMAIL_CLIENT_SECRET }}"
          fi
          if [ -n "${{ secrets.GMAIL_REFRESH_TOKEN }}" ]; then
            SECRET_VARS="${SECRET_VARS},GMAIL_REFRESH_TOKEN=${{ secrets.GMAIL_REFRESH_TOKEN }}"
          fi
          if [ -n "${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}" ]; then
            SECRET_VARS="${SECRET_VARS},GOOGLE_OAUTH_CLIENT_ID=${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}"
          fi

          # Combine env vars
          ALL_ENV_VARS="${SECRET_VARS}"
          if [ -n "${{ inputs.env-vars }}" ]; then
            ALL_ENV_VARS="${ALL_ENV_VARS},${{ inputs.env-vars }}"
          fi

          gcloud run deploy ${{ inputs.service-name }} \
            --image="${IMAGE}" \
            --region=${{ inputs.region }} \
            --platform=managed \
            --allow-unauthenticated \
            $CLOUD_SQL_FLAG \
            $VPC_FLAG \
            --set-env-vars="${ALL_ENV_VARS}" \
            --min-instances=${{ inputs.min-instances }} \
            --max-instances=${{ inputs.max-instances }} \
            --memory=${{ inputs.memory }} \
            --cpu=${{ inputs.cpu }} \
            --timeout=60

      - name: Output service URL
        id: output-url
        run: |
          URL=$(gcloud run services describe ${{ inputs.service-name }} \
            --region=${{ inputs.region }} \
            --format='value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "### Backend deployed successfully! :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "- Service: **${{ inputs.service-name }}**" >> $GITHUB_STEP_SUMMARY
          echo "- URL: $URL" >> $GITHUB_STEP_SUMMARY
