name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: MentalHelpGlobal/chat-types
          path: chat-types
          token: ${{ secrets.PKG_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
      - name: Build chat-types locally
        run: cd chat-types && npm install && npm run build
      - name: Install dependencies
        run: |
          npm pkg set "dependencies.@mentalhelpglobal/chat-types=file:./chat-types"
          npm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PKG_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.PKG_TOKEN }}
      - name: Typecheck
        run: npm run typecheck
      - name: Run tests with coverage
        run: npm run test:coverage
      - name: Check coverage threshold
        run: |
          COVERAGE=$(cat coverage/coverage-summary.json 2>/dev/null | jq -r '.total.statements.pct // 0')
          if (( $(echo "$COVERAGE < 45" | bc -l) )); then
            echo "::error::Coverage $COVERAGE% is below threshold 45%"
            exit 1
          fi
          echo "Coverage: $COVERAGE%"

  deploy-dev:
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: MentalHelpGlobal/chat-types
          path: chat-types
          token: ${{ secrets.PKG_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build chat-types for Docker context
        run: |
          cd chat-types && npm install && npm run build
          cd ..
          npm pkg set "dependencies.@mentalhelpglobal/chat-types=file:./chat-types"
          npm install

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Validate GCP secrets
        run: |
          set -euo pipefail
          PROJECT="${{ vars.GCP_PROJECT_ID }}"
          SECRETS="database-url-dev jwt-secret jwt-refresh-secret gmail-client-secret gmail-refresh-token google-oauth-client-id"
          ERRORS=0
          echo "=== GCP Secret Pre-flight Check ==="
          echo "Project: $PROJECT"
          echo ""
          for secret in $SECRETS; do
            VERSION_COUNT=$(gcloud secrets versions list "$secret" \
              --project="$PROJECT" \
              --filter="state=ENABLED" \
              --format="value(name)" 2>/dev/null | wc -l || echo "0")
            if [ "$VERSION_COUNT" -eq 0 ]; then
              echo "::error::Secret '$secret' has no active versions in project '$PROJECT'"
              ERRORS=$((ERRORS + 1))
            else
              echo "  ✓ $secret ($VERSION_COUNT active version(s))"
            fi
          done
          echo ""
          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::$ERRORS secret(s) failed validation. Add versions with:"
            echo '  echo "value" | gcloud secrets versions add SECRET_NAME --data-file=- --project='"$PROJECT"
            exit 1
          fi
          echo "All secrets validated successfully."

      - name: Apply DB migrations (dev)
        run: |
          set -euo pipefail

          PROJECT="${{ vars.GCP_PROJECT_ID }}"
          INSTANCE="${{ vars.CLOUD_SQL_CONNECTION }}"
          if [ -z "$INSTANCE" ]; then
            echo "::error::CLOUD_SQL_CONNECTION is not set"
            exit 1
          fi

          # NOTE: In some environments the deploy service account may not have
          # `cloudsql.instances.get` and/or `secretmanager.versions.access`.
          # Since migrations are a best-effort safety net (not required for every deploy),
          # skip them gracefully when permissions are missing rather than blocking the deploy.

          if ! DB_URL="$(gcloud secrets versions access latest --secret=database-url-dev --project="$PROJECT" 2>/dev/null)"; then
            echo "::warning::Skipping DB migrations: missing permission to access 'database-url-dev' secret (secretmanager.versions.access)."
            exit 0
          fi

          # Start Cloud SQL Proxy on localhost:5432
          curl -fsSL -o cloud-sql-proxy https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.21.1/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy
          ./cloud-sql-proxy "$INSTANCE" --port 5432 &
          PROXY_PID=$!

          # Wait for proxy port to be ready
          for i in $(seq 1 30); do
            if (echo > /dev/tcp/127.0.0.1/5432) >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          if ! (echo > /dev/tcp/127.0.0.1/5432) >/dev/null 2>&1; then
            echo "::warning::Skipping DB migrations: Cloud SQL Proxy did not become ready (likely missing cloudsql.instances.get)."
            kill "$PROXY_PID" || true
            exit 0
          fi

          echo "::add-mask::$DB_URL"
          export DB_URL
          export DATABASE_URL="$(node -e 'const u=new URL(process.env.DB_URL); u.hostname=\"127.0.0.1\"; u.port=\"5432\"; u.search=\"\"; console.log(u.toString());')"

          node scripts/apply-migration.js 024_create_survey_tables.sql dev
          node scripts/apply-migration.js 025_extend_surveys_invalidation_memory.sql dev

          kill "$PROXY_PID" || true

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          IMAGE="europe-west1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/chat-backend/chat-backend-dev:${{ github.sha }}"
          docker build --no-cache \
            --build-arg GITHUB_TOKEN=${{ secrets.PKG_TOKEN }} \
            -t "$IMAGE" .
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Push Docker image
        run: docker push "$IMAGE"

      - name: Deploy to Cloud Run
        run: |
          CLOUD_SQL_FLAG=""
          if [ -n "${{ vars.CLOUD_SQL_CONNECTION }}" ]; then
            CLOUD_SQL_FLAG="--add-cloudsql-instances=${{ vars.CLOUD_SQL_CONNECTION }}"
          fi

          VPC_FLAG=""
          if [ -n "${{ vars.VPC_CONNECTOR }}" ]; then
            VPC_FLAG="--vpc-connector=${{ vars.VPC_CONNECTOR }} --vpc-egress=private-ranges-only"
          fi

          gcloud run deploy chat-backend-dev \
            --image="${IMAGE}" \
            --region=europe-west1 \
            --platform=managed \
            --allow-unauthenticated \
            $CLOUD_SQL_FLAG \
            $VPC_FLAG \
            --set-env-vars="NODE_ENV=production" \
            --set-env-vars="SERVICE_SURFACE=chat" \
            --set-env-vars="FRONTEND_URL=${{ vars.FRONTEND_URL }}" \
            --set-env-vars="DIALOGFLOW_PROJECT_ID=${{ vars.DIALOGFLOW_PROJECT_ID }}" \
            --set-env-vars="DIALOGFLOW_AGENT_ID=${{ vars.DIALOGFLOW_AGENT_ID }}" \
            --set-env-vars="DIALOGFLOW_LOCATION=${{ vars.DIALOGFLOW_LOCATION }}" \
            --set-env-vars="LLM_PROVIDER=${{ vars.LLM_PROVIDER }}" \
            --set-env-vars="VERTEX_PROJECT_ID=${{ vars.VERTEX_PROJECT_ID }}" \
            --set-env-vars="VERTEX_LOCATION=${{ vars.VERTEX_LOCATION }}" \
            --set-env-vars="VERTEX_MODEL=${{ vars.VERTEX_MODEL }}" \
            --set-env-vars="EMAIL_PROVIDER=${{ vars.EMAIL_PROVIDER }}" \
            --set-env-vars="EMAIL_FROM=${{ vars.EMAIL_FROM }}" \
            --set-env-vars="GMAIL_CLIENT_ID=${{ vars.GMAIL_CLIENT_ID }}" \
            --set-env-vars="GCS_BUCKET_NAME=${{ vars.GCS_BUCKET_NAME }}" \
            --set-env-vars="REDIS_HOST=${{ vars.REDIS_HOST }}" \
            --set-env-vars="REDIS_PORT=${{ vars.REDIS_PORT || '6379' }}" \
            --set-secrets="DATABASE_URL=database-url-dev:latest" \
            --set-secrets="JWT_SECRET=jwt-secret:latest" \
            --set-secrets="JWT_REFRESH_SECRET=jwt-refresh-secret:latest" \
            --set-secrets="GMAIL_CLIENT_SECRET=gmail-client-secret:latest" \
            --set-secrets="GMAIL_REFRESH_TOKEN=gmail-refresh-token:latest" \
            --set-secrets="GOOGLE_OAUTH_CLIENT_ID=google-oauth-client-id:latest" \
            --min-instances=0 \
            --max-instances=10 \
            --memory=512Mi \
            --cpu=1 \
            --timeout=60

      - name: Deploy workbench backend to Cloud Run
        run: |
          CLOUD_SQL_FLAG=""
          if [ -n "${{ vars.CLOUD_SQL_CONNECTION }}" ]; then
            CLOUD_SQL_FLAG="--add-cloudsql-instances=${{ vars.CLOUD_SQL_CONNECTION }}"
          fi

          VPC_FLAG=""
          if [ -n "${{ vars.VPC_CONNECTOR }}" ]; then
            VPC_FLAG="--vpc-connector=${{ vars.VPC_CONNECTOR }} --vpc-egress=private-ranges-only"
          fi

          gcloud run deploy workbench-backend-dev \
            --image="${IMAGE}" \
            --region=europe-west1 \
            --platform=managed \
            --allow-unauthenticated \
            $CLOUD_SQL_FLAG \
            $VPC_FLAG \
            --set-env-vars="NODE_ENV=production" \
            --set-env-vars="SERVICE_SURFACE=workbench" \
            --set-env-vars="FRONTEND_URL=${{ vars.WORKBENCH_FRONTEND_URL }}" \
            --set-env-vars="WORKBENCH_FRONTEND_URL=${{ vars.WORKBENCH_FRONTEND_URL }}" \
            --set-env-vars="DIALOGFLOW_PROJECT_ID=${{ vars.DIALOGFLOW_PROJECT_ID }}" \
            --set-env-vars="DIALOGFLOW_AGENT_ID=${{ vars.DIALOGFLOW_AGENT_ID }}" \
            --set-env-vars="DIALOGFLOW_LOCATION=${{ vars.DIALOGFLOW_LOCATION }}" \
            --set-env-vars="LLM_PROVIDER=${{ vars.LLM_PROVIDER }}" \
            --set-env-vars="VERTEX_PROJECT_ID=${{ vars.VERTEX_PROJECT_ID }}" \
            --set-env-vars="VERTEX_LOCATION=${{ vars.VERTEX_LOCATION }}" \
            --set-env-vars="VERTEX_MODEL=${{ vars.VERTEX_MODEL }}" \
            --set-env-vars="EMAIL_PROVIDER=${{ vars.EMAIL_PROVIDER }}" \
            --set-env-vars="EMAIL_FROM=${{ vars.EMAIL_FROM }}" \
            --set-env-vars="GMAIL_CLIENT_ID=${{ vars.GMAIL_CLIENT_ID }}" \
            --set-env-vars="GCS_BUCKET_NAME=${{ vars.GCS_BUCKET_NAME }}" \
            --set-env-vars="REDIS_HOST=${{ vars.REDIS_HOST }}" \
            --set-env-vars="REDIS_PORT=${{ vars.REDIS_PORT || '6379' }}" \
            --set-secrets="DATABASE_URL=database-url-dev:latest" \
            --set-secrets="JWT_SECRET=jwt-secret:latest" \
            --set-secrets="JWT_REFRESH_SECRET=jwt-refresh-secret:latest" \
            --set-secrets="GMAIL_CLIENT_SECRET=gmail-client-secret:latest" \
            --set-secrets="GMAIL_REFRESH_TOKEN=gmail-refresh-token:latest" \
            --set-secrets="GOOGLE_OAUTH_CLIENT_ID=google-oauth-client-id:latest" \
            --min-instances=0 \
            --max-instances=10 \
            --memory=512Mi \
            --cpu=1 \
            --timeout=60

      - name: Output service URLs
        run: |
          CHAT_URL=$(gcloud run services describe chat-backend-dev --region=europe-west1 --format='value(status.url)')
          WB_URL=$(gcloud run services describe workbench-backend-dev --region=europe-west1 --format='value(status.url)')
          echo "### Backend deployed! :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "Chat URL: $CHAT_URL" >> $GITHUB_STEP_SUMMARY
          echo "Workbench URL: $WB_URL" >> $GITHUB_STEP_SUMMARY
