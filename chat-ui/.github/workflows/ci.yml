name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Deployed application URL (index.html)'
        required: true
        default: 'https://storage.googleapis.com/mental-help-global-25-dev-frontend/index.html'
      email:
        description: 'Email for OTP login (devCode available in browser console)'
        required: true
        default: 'playwright@mentalhelp.global'
      debug_pw_api:
        description: 'Enable Playwright DEBUG=pw:api (very verbose)'
        required: true
        type: boolean
        default: false
  # Run after chat-frontend deploys to dev
  workflow_run:
    workflows: ["Deploy to GCS"]
    branches: [develop]
    types:
      - completed

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >
      ${{
        github.event_name == 'workflow_dispatch' ||
        (github.event.workflow_run.conclusion == 'success')
      }}
    env:
      PLAYWRIGHT_BASE_URL: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.base_url || 'https://storage.googleapis.com/mental-help-global-25-dev-frontend/index.html' }}
      PLAYWRIGHT_EMAIL: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.email || 'playwright@mentalhelp.global' }}
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run E2E tests
        env:
          DEBUG: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.debug_pw_api == 'true') && 'pw:api' || '' }}
        run: |
          echo "PLAYWRIGHT_BASE_URL=$PLAYWRIGHT_BASE_URL"
          echo "PLAYWRIGHT_EMAIL=$PLAYWRIGHT_EMAIL"
          npx playwright test --reporter=line,html --retries=1 --timeout=90000 --workers=1

      - name: Print failure details
        if: failure()
        run: |
          echo "=== Steps to reproduce (from test-results/**/repro.md) ==="
          if [ -d "test-results" ]; then
            find test-results -type f -name "repro.md" -print -exec echo "-----" \; -exec cat {} \; -exec echo "" \;
          else
            echo "No test-results directory found."
          fi

      - name: Ensure test-results directory exists
        if: always()
        run: |
          mkdir -p test-results
          test -f test-results/keep.txt || echo "ok $(date -u +%FT%TZ)" > test-results/keep.txt

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: warn
          retention-days: 14
